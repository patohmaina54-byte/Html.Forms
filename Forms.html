<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="Forms.css">
    <link rel="stylesheet" type="text/css" href="divstyle.css">
</head>
<body>

<div class="form-container">
    <h2>Data Collection Form</h2>
    <form id="dataForm">
        <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="firstName" required>
        </div>
        
        <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="lastName" required>
        </div>

        <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" name="dob" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <div class="radio-group">
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label>
            </div>
        </div>

        <div class="form-group">
            <label for="opinion">Opinion on "Ubuntu" (Togetherness):</label>
            <textarea id="opinion" name="opinion" rows="4"></textarea>
        </div>

        <div class="buttons">
            <button type="submit" class="btn-submit">Submit</button>
            <button type="reset" class="btn-clear">Clear</button>
            <button type="button" class="btn-cancel" onclick="alert('Cancelled')">Cancel</button>
        </div>
    </form>
</div>

</body>
</html>
